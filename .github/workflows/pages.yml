# Deploy the static player + editor (the app/ folder) to GitHub Pages.
# The site root is app/, so the player is at / and the editor at /editor.html.
# A push to main (including commits the hosted editor makes via the Contents API)
# redeploys automatically. Requires Settings -> Pages -> Source = "GitHub Actions".
name: pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-flight production deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload app/ as the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: app          # publish ONLY the app/ subfolder as the site root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
